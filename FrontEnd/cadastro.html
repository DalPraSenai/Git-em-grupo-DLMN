<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Item</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../CSS - Style/style.css">
</head>
<body>

<!-- Navbar -->
<header>
  <nav class="navbar navbar-expand-lg bg-body-tertiary py-2 shadow-sm">
    <div class="container-fluid">

      <a class="navbar-brand fw-semibold" href="index.html">Inicio</a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNavDropdown">
        <ul class="navbar-nav ms-auto align-items-center gap-2">
          <li class="nav-item">
            <a class="nav-link" href="catalogo.html">Itens Mágicos</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="cadastro.html">Cadastro de Item</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="sobre.html">Sobre</a>
          </li>
        </ul>
      </div>

    </div>
  </nav>
</header>

<!-- Conteúdo Principal -->
<section class="cadastro">
  <div class="card-Cadastro">
    <h1 class="login-titulo">Novo Item</h1>
    <p class="login-subtitulo">O Legado de Tartarius</p>

    <div class="mb-3">
      <label class="login-label" for="nomeItem">Nome do item</label>
      <input class="form-control login-input" id="nomeItem" type="text" placeholder="Ex: Espada das Sombras...">
      <div class="invalid-feedback">Preencha o nome do item.</div>
    </div>

    <div class="mb-3">
      <label class="login-label" for="categoriaItem">Categoria</label>
      <select class="form-control login-input" id="categoriaItem">
        <option value="">Selecione...</option>
        <option value="Amuleto">Amuleto</option>
        <option value="Arma">Arma</option>
        <option value="Poção">Poção</option>
        <option value="Anel">Anel</option>
        <option value="Livro">Livro</option>
      </select>
      <div class="invalid-feedback">Selecione uma categoria.</div>
    </div>

    <div class="mb-3">
      <label class="login-label" for="raridadeItem">Raridade</label>
      <select class="form-control login-input" id="raridadeItem">
        <option value="">Selecione...</option>
        <option value="Comum">Comum</option>
        <option value="Raro">Raro</option>
        <option value="Épico">Épico</option>
        <option value="Lendário">Lendário</option>
      </select>
      <div class="invalid-feedback">Selecione uma raridade.</div>
    </div>

    <div class="mb-3">
      <label class="login-label" for="descricaoItem">Descrição</label>
      <textarea class="form-control login-input" id="descricaoItem" rows="3" placeholder="Descreva o item..."></textarea>
      <div class="invalid-feedback">Preencha a descrição.</div>
    </div>

    <button class="card-btn" onclick="cadastrarItem()">Adicionar ao Legado</button>

    <div id="mensagem-sucesso" style="display:none;" class="alert mt-3">
      Item adicionado ao legado!
    </div>
  </div>
</section>

<!-- Footer -->
<footer class="footer">
  <p class="pFooter">O Legado de Tartarius &copy; 2026 — Grupo Tartarius</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="../JavaScript - BackEnd/cadastro.js"></script>

</body>
</html>
